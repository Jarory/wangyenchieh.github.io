<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豪華貓抓老鼠</title>
<style>
body{
  margin:0;
  background:linear-gradient(to bottom,#1b1b1b,#2b2b2b);
  color:white;
  text-align:center;
  font-family:Arial;
}
h1{margin:10px 0;}
#score{font-size:18px;margin-bottom:8px;}
button{
  padding:8px 16px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
canvas{
  background:#111;
  border:3px solid white;
  max-width:92vw;
  max-height:70vh;
}
.controls{
  display:none;
  margin-top:10px;
}
.controls button{
  width:65px;
  height:55px;
  font-size:20px;
}
@media(max-width:768px){
  .controls{display:block;}
}
</style>
</head>
<body>

<h1>🐱🐭 豪華貓抓老鼠</h1>
<div id="score">存活秒數：0</div>
<button onclick="startGame()">開始遊戲</button>
<button onclick="restartGame()">重新開始</button>
<br>
<canvas id="game" width="500" height="400"></canvas>

<div class="controls">
  <button ontouchstart="keys['ArrowUp']=true" ontouchend="keys['ArrowUp']=false">⬆</button><br>
  <button ontouchstart="keys['ArrowLeft']=true" ontouchend="keys['ArrowLeft']=false">⬅</button>
  <button ontouchstart="keys['ArrowDown']=true" ontouchend="keys['ArrowDown']=false">⬇</button>
  <button ontouchstart="keys['ArrowRight']=true" ontouchend="keys['ArrowRight']=false">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mouse;
let cats;
let warningCats;
let obstacles;
let keys = {};
let survive = 0;
let started = false;
let gameLoop = null;
let difficultyTimer = null;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function isInsideObstacle(x,y,size,obj){
  return (
    x < obj.x + obj.w &&
    x + size > obj.x &&
    y < obj.y + obj.h &&
    y + size > obj.y
  );
}

function generateObstacles(){
  obstacles = [];

  while(obstacles.length < 6){
    let newObs = {
      x: Math.random()*400 + 30,
      y: Math.random()*280 + 30,
      w: 40 + Math.random()*30,
      h: 40 + Math.random()*30
    };

    let overlapMouse = isInsideObstacle(50,50,24,newObs);
    let overlap = false;

    for(let obs of obstacles){
      if(
        newObs.x < obs.x + obs.w + 15 &&
        newObs.x + newObs.w + 15 > obs.x &&
        newObs.y < obs.y + obs.h + 15 &&
        newObs.y + newObs.h + 15 > obs.y
      ){
        overlap = true;
        break;
      }
    }

    if(!overlapMouse && !overlap){
      obstacles.push(newObs);
    }
  }
}

function generateSafeCatPosition(){
  while(true){
    let x = Math.random()*470;
    let y = Math.random()*370;

    let tooCloseToMouse =
      Math.abs(x - mouse.x) < 120 &&
      Math.abs(y - mouse.y) < 120;

    let insideObstacle = false;

    for(let obs of obstacles){
      if(isInsideObstacle(x,y,24,obs)){
        insideObstacle = true;
        break;
      }
    }

    if(!tooCloseToMouse && !insideObstacle){
      return {x,y};
    }
  }
}

function initState(){
  mouse = {x:50,y:50,size:24,speed:4};

  cats = [
    {x:430,y:330,size:24,speed:1.5}
  ];

  warningCats = [];
  generateObstacles();

  survive = 0;
  started = false;
  document.getElementById("score").innerText = "存活秒數：0";
}

function startGame(){
  if(gameLoop) return;

  started = true;

  gameLoop = setInterval(()=>{
    update();
    draw();
  },20);

  difficultyTimer = setInterval(()=>{
    if(started){
      increaseDifficulty();
    }
  },1000);
}

function restartGame(){
  clearInterval(gameLoop);
  clearInterval(difficultyTimer);
  gameLoop = null;
  difficultyTimer = null;
  initState();
  draw();
}

function endGame(){
  started = false;
  clearInterval(gameLoop);
  clearInterval(difficultyTimer);
  gameLoop = null;
  difficultyTimer = null;

  setTimeout(()=>{
    alert("🐱 被貓抓到了！你存活了 " + survive + " 秒");
  },100);
}

function increaseDifficulty(){
  survive++;
  document.getElementById("score").innerText = "存活秒數：" + survive;

  if(survive % 10 === 0){
    let pos = generateSafeCatPosition();

    warningCats.push({
      x:pos.x,
      y:pos.y,
      time:100,
      speed:1.5 + survive*0.03
    });
  }

  cats.forEach(cat=>{
    cat.speed += 0.015;
  });
}

function update(){

  if(keys["ArrowUp"]||keys["w"]) mouse.y -= mouse.speed;
  if(keys["ArrowDown"]||keys["s"]) mouse.y += mouse.speed;
  if(keys["ArrowLeft"]||keys["a"]) mouse.x -= mouse.speed;
  if(keys["ArrowRight"]||keys["d"]) mouse.x += mouse.speed;

  mouse.x = Math.max(0,Math.min(canvas.width-mouse.size,mouse.x));
  mouse.y = Math.max(0,Math.min(canvas.height-mouse.size,mouse.y));

  for(let obs of obstacles){
    if(isInsideObstacle(mouse.x,mouse.y,mouse.size,obs)){
      if(keys["ArrowUp"]||keys["w"]) mouse.y += mouse.speed;
      if(keys["ArrowDown"]||keys["s"]) mouse.y -= mouse.speed;
      if(keys["ArrowLeft"]||keys["a"]) mouse.x += mouse.speed;
      if(keys["ArrowRight"]||keys["d"]) mouse.x -= mouse.speed;
    }
  }

  for(let cat of cats){

    let dx = mouse.x - cat.x;
    let dy = mouse.y - cat.y;

    let moveX = dx===0 ? 0 : (dx>0 ? cat.speed : -cat.speed);
    let moveY = dy===0 ? 0 : (dy>0 ? cat.speed : -cat.speed);

    let tryX = cat.x + moveX;
    let tryY = cat.y + moveY;

    let hit = false;

    for(let obs of obstacles){
      if(isInsideObstacle(tryX,tryY,cat.size,obs)){
        hit = true;
        break;
      }
    }

    if(!hit){
      cat.x = tryX;
      cat.y = tryY;
    }else{
      let altX = cat.x + moveX;
      let altHit = false;

      for(let obs of obstacles){
        if(isInsideObstacle(altX,cat.y,cat.size,obs)){
          altHit = true;
          break;
        }
      }

      if(!altHit){
        cat.x = altX;
      }else{
        let altY = cat.y + moveY;
        let altHit2 = false;

        for(let obs of obstacles){
          if(isInsideObstacle(cat.x,altY,cat.size,obs)){
            altHit2 = true;
            break;
          }
        }

        if(!altHit2){
          cat.y = altY;
        }
      }
    }

    if(
      mouse.x < cat.x+cat.size &&
      mouse.x+mouse.size > cat.x &&
      mouse.y < cat.y+cat.size &&
      mouse.y+mouse.size > cat.y
    ){
      endGame();
      return;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let obs of obstacles){
    ctx.fillStyle="#666";
    ctx.fillRect(obs.x,obs.y,obs.w,obs.h);
  }

  ctx.font="26px Arial";

  for(let i=warningCats.length-1;i>=0;i--){
    let w = warningCats[i];

    ctx.fillText("⚠",w.x,w.y+20);
    w.time--;

    if(w.time<=0){
      cats.push({
        x:w.x,
        y:w.y,
        size:24,
        speed:w.speed
      });
      warningCats.splice(i,1);
    }
  }

  ctx.font="24px Arial";
  ctx.fillText("🐭",mouse.x,mouse.y+20);

  for(let cat of cats){
    ctx.fillText("🐱",cat.x,cat.y+20);
  }
}

initState();
draw();
</script>

</body>
</html>
